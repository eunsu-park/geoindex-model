# Experiment A1: Strong regularization (weight decay + high dropout)
# Goal: Fix 24h prediction overfitting via L2 regularization and increased dropout
# Usage: python scripts/train.py --config-name=in2d_out24h_A1

defaults:
  - in2d_out24h
  - _self_

experiment:
  name: "in2d_out24h_A1_regularization"

training:
  weight_decay: 0.01

model:
  transformer_dropout: 0.3
