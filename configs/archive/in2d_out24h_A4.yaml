# Experiment A4: Reduced model capacity + regularization
# Goal: Test if smaller model generalizes better for 24h prediction
# Usage: python scripts/train.py --config-name=in2d_out24h_A4

defaults:
  - in2d_out24h
  - _self_

experiment:
  name: "in2d_out24h_A4_small_model"

training:
  weight_decay: 0.01

model:
  d_model: 64
  transformer_nhead: 4
  transformer_num_layers: 1
  transformer_dim_feedforward: 128
  transformer_dropout: 0.2
