# Experiment A2: Cosine annealing scheduler + LR warmup
# Goal: Force LR decay (ReduceOnPlateau never triggers due to train_loss-based stepping)
# Usage: python scripts/train.py --config-name=in2d_out24h_A2

defaults:
  - in2d_out24h
  - _self_

experiment:
  name: "in2d_out24h_A2_cosine"

training:
  scheduler_type: "cosine_annealing"
  cosine_annealing:
    T_0: 10
    T_mult: 2
    eta_min: 1.0e-6
  lr_warmup:
    enable: true
    warmup_epochs: 3
    warmup_start_factor: 0.1
