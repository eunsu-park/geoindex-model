# Experiment A3: Combined regularization + cosine annealing
# Goal: Maximum config-only overfitting mitigation (A1 + A2 combined)
# Usage: python scripts/train.py --config-name=in2d_out24h_A3

defaults:
  - in2d_out24h
  - _self_

experiment:
  name: "in2d_out24h_A3_combined"

training:
  weight_decay: 0.01
  scheduler_type: "cosine_annealing"
  cosine_annealing:
    T_0: 10
    T_mult: 2
    eta_min: 1.0e-6
  lr_warmup:
    enable: true
    warmup_epochs: 3
    warmup_start_factor: 0.1

model:
  transformer_dropout: 0.3
