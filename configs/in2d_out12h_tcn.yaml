# Experiment: TCN encoder for 12h prediction
# Goal: Compare TCN vs Transformer on 12h task
# Usage: python scripts/train.py --config-name=in2d_out12h_tcn

defaults:
  - in2d_out12h
  - _self_

experiment:
  name: "in2d_out12h_tcn"

model:
  model_type: "tcn"
  tcn_channels:
    - 64
    - 128
    - 256
  tcn_kernel_size: 3
  tcn_dropout: 0.1
