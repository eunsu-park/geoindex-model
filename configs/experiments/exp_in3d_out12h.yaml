# Experiment: 3-day input, 12-hour output
# Input: d-3 ~ d-1 (144 timesteps), Output: 0~12h (24 timesteps)
#
# Usage:
#   python scripts/train.py --config-name=local \
#       +experiments=exp_in3d_out12h

experiment:
  name: "in3d_out12h"

data:
  timeseries:
    input_start: -144
    input_end: 0
    target_start: 0
    target_end: 24
