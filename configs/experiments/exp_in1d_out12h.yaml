# Experiment: 1-day input, 12-hour output
# Input: d-1 (48 timesteps), Output: 0~12h (24 timesteps)
#
# Usage:
#   python scripts/train.py --config-name=local \
#       +experiments=exp_in1d_out12h

experiment:
  name: "in1d_out12h"

data:
  timeseries:
    input_start: -48
    input_end: 0
    target_start: 0
    target_end: 24
