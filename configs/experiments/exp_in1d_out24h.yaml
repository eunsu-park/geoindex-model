# Experiment: 1-day input, 24-hour output
# Input: d-1 (48 timesteps), Output: 0~24h (48 timesteps)
#
# Usage:
#   python scripts/train.py --config-name=local \
#       +experiments=exp_in1d_out24h

experiment:
  name: "in1d_out24h"

data:
  timeseries:
    input_start: -48
    input_end: 0
    target_start: 0
    target_end: 48
