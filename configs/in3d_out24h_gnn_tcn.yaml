# Experiment: gnn_tcn for in3d out24h
# Usage: python scripts/train.py --config-name=in3d_out24h_gnn_tcn

defaults:
  - in3d_out24h
  - _self_

experiment:
  name: "in3d_out24h_gnn_tcn"

model:
  model_type: "gnn"
  gnn_temporal_type: "tcn"

training:
  learning_rate: 5.0e-5
  weight_decay: 0.01
  scheduler_type: "cosine_annealing"
  epochs: 60

data:
  timeseries:
    augmentation:
      gaussian_noise_std: 0.05
